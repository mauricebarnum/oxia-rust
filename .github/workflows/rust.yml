name: Rust

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "build/Dockerfile"
      - ".github/workflows/docker-image.yml"
  pull_request:
    paths-ignore:
      - "build/Dockerfile"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode (auto = ci for branches, ci-debug for PRs)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - ci
          - debug
      extra_env:
        description: "Extra environment variables (e.g., FOO=bar BAZ=qux)"
        required: false
        default: ""

jobs:
  build:
    uses: ./.github/workflows/rust-build.yml
    with:
      image: ghcr.io/${{ github.repository }}/rust-build:latest
      build_mode: ${{ inputs.build_mode || 'auto' }}
      extra_env: ${{ inputs.extra_env || '' }}
      caller_event_name: ${{ github.event_name }}
    secrets: inherit
