name: Rust Build (Reusable)

on:
  workflow_call:
    inputs:
      image:
        description: "Docker image to use for build container"
        required: true
        type: string
      build_mode:
        description: "Build mode: auto, ci, ci-debug, or debug"
        required: false
        default: "auto"
        type: string
      extra_env:
        description: "Extra environment variables (e.g., FOO=bar BAZ=qux)"
        required: false
        default: ""
        type: string
      caller_event_name:
        description: "Event name from caller (used for auto build_mode PR detection)"
        required: false
        default: ""
        type: string

env:
  CARGO_TERM_COLOR: always
  # Use sccache with local cache only (no GitHub Actions cache)
  SCCACHE_DIR: "/tmp/sccache"
  RUSTC_WRAPPER: "sccache"
  RUST_BACKTRACE: full

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: set-extra-env
        if: inputs.extra_env != ''
        run: |
          echo "Setting extra environment variables: ${{ inputs.extra_env }}"
          for pair in ${{ inputs.extra_env }}; do
            echo "Exporting $pair"
            echo "$pair" >> $GITHUB_ENV
          done

      - name: checkout
        uses: actions/checkout@v5

      - name: cargo-deny
        run: cargo deny check

      - name: set-build-profile
        run: |
          BUILD_MODE="${{ inputs.build_mode }}"
          EVENT="${{ inputs.caller_event_name || github.event_name }}"
          if [ "$BUILD_MODE" = "ci" ]; then
            echo "CARGO_PROFILE=ci" >> $GITHUB_ENV
            echo "RELEASE_FLAG=--profile ci" >> $GITHUB_ENV
            echo "NEXTEST_FLAG=--cargo-profile ci" >> $GITHUB_ENV
          elif [ "$BUILD_MODE" = "debug" ]; then
            echo "CARGO_PROFILE=debug" >> $GITHUB_ENV
            echo "RELEASE_FLAG=" >> $GITHUB_ENV
            echo "NEXTEST_FLAG=" >> $GITHUB_ENV
          elif [ "$BUILD_MODE" = "ci-debug" ]; then
            echo "CARGO_PROFILE=ci-debug" >> $GITHUB_ENV
            echo "RELEASE_FLAG=--profile ci-debug" >> $GITHUB_ENV
            echo "NEXTEST_FLAG=--cargo-profile ci-debug" >> $GITHUB_ENV
          elif [ "$EVENT" = "pull_request" ]; then
            # Auto mode: ci-debug for PRs
            echo "CARGO_PROFILE=ci-debug" >> $GITHUB_ENV
            echo "RELEASE_FLAG=--profile ci-debug" >> $GITHUB_ENV
            echo "NEXTEST_FLAG=--cargo-profile ci-debug" >> $GITHUB_ENV
          else
            # Auto mode: ci profile for branch pushes (main or any other branch)
            echo "CARGO_PROFILE=ci" >> $GITHUB_ENV
            echo "RELEASE_FLAG=--profile ci" >> $GITHUB_ENV
            echo "NEXTEST_FLAG=--cargo-profile ci" >> $GITHUB_ENV
          fi
          echo "Build mode: $BUILD_MODE, Event: $EVENT, Profile: $CARGO_PROFILE"

      # TODO: move this to the build image
      - name: Compute rustc hash
        run: echo "RUSTC_HASH=$(rustc --version | sha256sum | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: enable-sccache
        uses: actions/cache@v4
        with:
          path: /tmp/sccache
          key: sccache-${{ runner.os }}-${{ env.CARGO_PROFILE }}-${{ env.RUSTC_HASH }}
          restore-keys: |
            sccache-${{ runner.os }}-${{ env.CARGO_PROFILE }}-

      - name: enable-miri-cache
        uses: actions/cache@v4
        with:
          path: /home/runner/deps/target/miri
          key: miri-${{ runner.os }}-${{ env.RUSTC_HASH }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            miri-${{ runner.os }}-${{ env.RUSTC_HASH }}-

      - name: detect-vendored-build
        id: vendored
        run: |
          vendored=false
          if [ -f .cargo/config.toml ] && grep -q 'vendored-sources' .cargo/config.toml; then
            vendored=true
          fi
          echo "vendored=${vendored}" >> "$GITHUB_OUTPUT"

      - name: fetch-dependencies
        if: steps.vendored.outputs.vendored == 'false'
        run: |
          cargo update --dry-run --verbose # update crate index
          cargo fetch --locked   # fetch dependencies: last network dependency

      - name: build
        run: cargo build $RELEASE_FLAG --frozen --all-targets

      - name: clippy
        run: cargo clippy $RELEASE_FLAG --no-deps --all-targets --frozen -- -D warnings

      - name: test
        timeout-minutes: 10
        run: cargo nextest run $NEXTEST_FLAG --frozen --no-fail-fast --verbose

      - name: miri-client
        run: |
          unset RUSTC_WRAPPER
          cargo +nightly miri nextest run --package mauricebarnum-oxia-client --frozen
        env:
          MIRIFLAGS: -Zmiri-strict-provenance -Zmiri-symbolic-alignment-check -Zmiri-disable-isolation

      - name: show-sccache-stats
        run: sccache --show-stats || true
