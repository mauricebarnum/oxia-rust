name: Rust Build (Reusable)

on:
  workflow_call:
    inputs:
      image:
        description: "Docker image to use for build container"
        required: true
        type: string
      build_mode:
        description: "Build mode: auto, ci, ci-debug, or debug"
        required: false
        default: "auto"
        type: string
      extra_env:
        description: "Extra environment variables (e.g., FOO=bar BAZ=qux)"
        required: false
        default: ""
        type: string
      diagnose_build_fingerprints:
        description: "Emit Cargo fingerprint diagnostics for the cargo build step"
        required: false
        default: false
        type: boolean
      caller_event_name:
        description: "Event name from caller (used for auto build_mode PR detection)"
        required: false
        default: ""
        type: string

env:
  CARGO_TERM_COLOR: always
  SCCACHE_DIR: "/tmp/sccache"
  RUSTC_WRAPPER: "sccache"
  RUST_BACKTRACE: full

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: set-extra-env
        if: inputs.extra_env != ''
        env:
          EXTRA_ENV: ${{ inputs.extra_env }}
        run: |
          echo "Setting extra environment variables: $EXTRA_ENV"
          echo "$EXTRA_ENV" >> $GITHUB_ENV

      - name: checkout
        uses: actions/checkout@v7

      - name: cargo-deny
        run: cargo deny check

      - name: set-build-profile
        env:
          BUILD_MODE_INPUT: ${{ inputs.build_mode }}
          EVENT_INPUT: ${{ inputs.caller_event_name || github.event_name }}
        run: |
          BUILD_MODE="$BUILD_MODE_INPUT"
          EVENT="$EVENT_INPUT"
          if [ "$BUILD_MODE" = "ci" ]; then
            echo "CARGO_PROFILE=ci" >> $GITHUB_ENV
            echo "RELEASE_FLAG=--profile ci" >> $GITHUB_ENV
            echo "NEXTEST_FLAG=--cargo-profile ci" >> $GITHUB_ENV
          elif [ "$BUILD_MODE" = "debug" ]; then
            echo "CARGO_PROFILE=debug" >> $GITHUB_ENV
            echo "RELEASE_FLAG=" >> $GITHUB_ENV
            echo "NEXTEST_FLAG=" >> $GITHUB_ENV
          elif [ "$BUILD_MODE" = "ci-debug" ]; then
            echo "CARGO_PROFILE=ci-debug" >> $GITHUB_ENV
            echo "RELEASE_FLAG=--profile ci-debug" >> $GITHUB_ENV
            echo "NEXTEST_FLAG=--cargo-profile ci-debug" >> $GITHUB_ENV
          elif [ "$EVENT" = "pull_request" ]; then
            # Auto mode: ci-debug for PRs
            echo "CARGO_PROFILE=ci-debug" >> $GITHUB_ENV
            echo "RELEASE_FLAG=--profile ci-debug" >> $GITHUB_ENV
            echo "NEXTEST_FLAG=--cargo-profile ci-debug" >> $GITHUB_ENV
          else
            # Auto mode: ci profile for branch pushes (main or any other branch)
            echo "CARGO_PROFILE=ci" >> $GITHUB_ENV
            echo "RELEASE_FLAG=--profile ci" >> $GITHUB_ENV
            echo "NEXTEST_FLAG=--cargo-profile ci" >> $GITHUB_ENV
          fi
          echo "Build mode: $BUILD_MODE, Event: $EVENT, Profile: $CARGO_PROFILE"

      - name: sync-mtimes-to-git-history
        run: |
          git -c safe.directory=/__w/oxia-rust/oxia-rust \
              -c alias.whatchanged='log --raw --no-merges' \
              -c diff.renames=false \
              restore-mtime -q

      - name: Compute rustc hash
        run: echo "RUSTC_HASH=$(rustc --version | sha256sum | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: enable-sccache
        uses: actions/cache@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-${{ env.CARGO_PROFILE }}-${{ env.RUSTC_HASH }}
          restore-keys: |
            sccache-${{ runner.os }}-${{ env.CARGO_PROFILE }}-

      - name: detect-vendored-build
        id: vendored
        run: |
          vendored=false
          if [ -f .cargo/config.toml ] && grep -q 'vendored-sources' .cargo/config.toml; then
            vendored=true
          fi
          echo "vendored=${vendored}" >> "$GITHUB_OUTPUT"

      - name: fetch-dependencies
        if: steps.vendored.outputs.vendored == 'false'
        run: |
          cargo update --dry-run --verbose # update crate index
          cargo fetch --locked   # fetch dependencies: last network dependency

      - name: build
        env:
          CARGO_LOG: ${{ inputs.diagnose_build_fingerprints && 'cargo::core::compiler::fingerprint=info' || '' }}
        run: cargo build $RELEASE_FLAG --frozen --all-targets --features metrics

      - name: clippy
        run: cargo clippy $RELEASE_FLAG --no-deps --frozen --all-targets --features metrics -- -D warnings

      - name: check-external-types
        run: |
          cd client
          cargo +"$RUST_VERSION_EXTERNAL_TYPES" check-external-types --all-features

      - name: test
        timeout-minutes: 15
        run: cargo nextest run $NEXTEST_FLAG --frozen --features metrics --no-fail-fast --verbose

      - name: doc-test
        run: cargo test --doc $RELEASE_FLAG --frozen --verbose

      - name: miri-client
        run: |
          unset RUSTC_WRAPPER
          cargo +nightly miri test --package mauricebarnum-oxia-client --features metrics --frozen
        env:
          MIRIFLAGS: -Zmiri-strict-provenance -Zmiri-symbolic-alignment-check -Zmiri-disable-isolation

      - name: show-sccache-stats
        run: sccache --show-stats
