name: build-docker-image

on:
  push:
    branches: ["main"]
    paths:
      - "build/Dockerfile"
      - "build/Dockerfile.dockerignore"
      - "build/cargo-config.toml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "*/Cargo.toml"
      - "ext/oxia.version"
      - "ext/oxia/**"
      - ".github/workflows/docker-image.yml"
      - ".github/workflows/rust-build.yml"
  pull_request:
    paths:
      - "build/Dockerfile"
      - "build/Dockerfile.dockerignore"
      - "build/cargo-config.toml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "*/Cargo.toml"
      - "ext/oxia.version"
      - "ext/oxia/**"
      - ".github/workflows/docker-image.yml"
      - ".github/workflows/rust-build.yml"
  workflow_dispatch:
  schedule:
    - cron: "13 3 6 * *" # monthly

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/rust-build

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Sync Git Timestamps on Host
        run: |
          sudo apt-get update
          sudo apt-get install -y git-restore-mtime
          git -c alias.whatchanged='log --raw --no-merges' -c diff.renames=false restore-mtime -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (SHA tag only)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          build-args: REPO_NAME=${{ github.event.repository.name }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/rust-build:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/rust-build:cache,mode=max
          no-cache: ${{ github.event_name == 'schedule' }}

  validate-image:
    needs: build-image
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/rust-build.yml
    with:
      image: ghcr.io/${{ github.repository }}/rust-build@${{ needs.build-image.outputs.image_digest }}
      build_mode: ci
      diagnose_build_fingerprints: true
    secrets: inherit

  tag-latest:
    needs: validate-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag SHA image as latest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
