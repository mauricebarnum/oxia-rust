name: build-docker-image

on:
  push:
    branches: ["**"]
    paths:
      - "build/Dockerfile"
      - "build/Dockerfile.dockerignore"
      - "build/cargo-config.toml"
      - "ext/oxia.version"
      - "ext/oxia/**"
      - ".github/workflows/docker-image.yml"
      - ".github/workflows/rust-build.yml"
  workflow_dispatch:
  schedule:
    - cron: "13 3 1-5,7-31 * *" # nightly, except for the monthly refresh
    - cron: "13 3 6 * *" # monthly OS and apt refresh

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/rust-build

jobs:
  build-image:
    runs-on: ubuntu-24.04-arm
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_changed: ${{ steps.compare.outputs.image_changed }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Sync Git Timestamps on Host
        run: |
          sudo apt-get update
          sudo apt-get install -y git-restore-mtime
          git config --global safe.directory /__w/oxia-rust/oxia-rust
          git config --global alias.whatchanged 'log --raw --no-merges'
          git config --global diff.renames false

          git restore-mtime -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect current latest image
        id: latest
        env:
          LATEST_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        run: |
          latest_hash=""
          if image_config="$(docker buildx imagetools inspect \
            "$LATEST_IMAGE" --format '{{json .Image}}' 2>/dev/null)"; then
            latest_hash="$(printf '%s' "$image_config" | sha256sum | cut -d' ' -f1)"
          fi
          echo "image_hash=$latest_hash" >> "$GITHUB_OUTPUT"

      - name: Build and push (SHA tag only)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: build/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          build-args: REPO_NAME=${{ github.event.repository.name }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/rust-build:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/rust-build:cache,mode=max
          no-cache-filters: ${{ github.event.schedule == '13 3 6 * *' && 'os-base' || '' }}
          pull: true

      - name: Compare candidate with latest
        id: compare
        env:
          CANDIDATE_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          LATEST_HASH: ${{ steps.latest.outputs.image_hash }}
        run: |
          candidate_config="$(docker buildx imagetools inspect \
            "$CANDIDATE_IMAGE" --format '{{json .Image}}')"
          candidate_hash="$(printf '%s' "$candidate_config" | sha256sum | cut -d' ' -f1)"

          if [ -z "$LATEST_HASH" ] || [ "$candidate_hash" != "$LATEST_HASH" ]; then
            echo "image_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "image_changed=false" >> "$GITHUB_OUTPUT"
          fi

  validate-image:
    needs: build-image
    if: needs.build-image.outputs.image_changed == 'true'
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/rust-build.yml
    with:
      image: ghcr.io/${{ github.repository }}/rust-build@${{ needs.build-image.outputs.image_digest }}
      build_mode: ci
      diagnose_build_fingerprints: true
    secrets: inherit

  tag-latest:
    needs: validate-image
    if: github.ref == 'refs/heads/main' && needs.validate-image.result == 'success'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag SHA image as latest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
