name: build-docker-image

on:
  push:
    branches: ["main"]
    paths:
      - "build/Dockerfile"
      - ".github/workflows/docker-image.yml"
  pull_request:
    paths:
      - ".github/workflows/docker-image.yml"
      - "build/Dockerfile"
      - "ext/oxia.version"
      - "ext/oxia/**"
  workflow_dispatch:
  schedule:
    - cron: "13 3 6 * *" # monthly

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/rust-build

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (SHA tag only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          build-args: REPO_NAME=${{ github.event.repository.name }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/rust-build:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/rust-build:cache,mode=max
          no-cache: ${{ github.event_name == 'schedule' }}

  validate-image:
    needs: build-image
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/rust-build.yml
    with:
      image: ghcr.io/${{ github.repository }}/rust-build:sha-${{ github.sha }}
      build_mode: ci
    secrets: inherit

  tag-latest:
    needs: validate-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag SHA image as latest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
