# ci/deny.toml

[graph]
# Keep this false unless CI explicitly wants to audit every optional feature.
# You can still pass --all-features on the command line for a separate job.
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
# Leave empty unless you have a documented exception.
ignore = [
]

# Fail CI if Cargo.lock contains a yanked crate.
yanked = "deny"

# These are scope selectors, not warn/deny/allow lint levels.
# "workspace" means direct workspace dependencies only.
# "all" includes transitive dependencies.
unmaintained = "workspace"
unsound = "all"

[licenses]
# Global allow-list. Keep this mostly permissive-license-only.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

confidence-threshold = 0.8

# Add crate-specific exceptions here rather than globally allowing copyleft
# licenses such as LGPL/GPL/AGPL.
exceptions = [
    # Example:
    # { crate = "some-crate", allow = ["LGPL-2.1-or-later"] },
]

[licenses.private]
ignore = false
registries = [
]

[bans]
# Duplicate transitive versions are often normal Rust ecosystem churn.
# Keep this out of CI noise unless you want active dependency-tree gardening.
multiple-versions = "allow"

# Wildcard dependency requirements are almost never intentional.
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"

workspace-default-features = "allow"
external-default-features = "allow"

allow = [
]

deny = [
]

skip = [
]

skip-tree = [
]

[sources]
# Only crates.io registry dependencies should appear unless explicitly allowed.
unknown-registry = "deny"

# Git dependencies can be legitimate, but should remain visible.
unknown-git = "warn"

allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]

allow-git = [
]

[sources.allow-org]
github = [
]
gitlab = [
]
bitbucket = [
]
